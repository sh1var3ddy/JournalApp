name: Java CI

on:
  push:
    branches: ["main","master"]
  pull_request:
    branches: ["main","master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: chmod +x mvnw

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - run: ./mvnw clean verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app.jar
          path: target/*.jar