name: Docker

on:
  workflow_run:
    workflows: ["Java CI"]
    types:
      - completed
  workflow_dispatch:

jobs:
  docker:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download JAR artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: app-jar
          path: .

      - name: Rename JAR
        run: |
          JAR_FILE=$(ls *.jar | head -n 1)
          mv "$JAR_FILE" app.jar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/journal-app:latest .

      - name: Push image
        run: docker push ghcr.io/${{ github.repository_owner }}/journal-app:latest